name: Build Release ZIP

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build the ZIP for (e.g. v1.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          tag="${INPUT_TAG:-$EVENT_TAG}"
          if [ -z "$tag" ]; then
            echo "No tag resolved — pass `tag` input or trigger via release event." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Build plugin ZIP
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p /tmp/seo-copilot
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='build-zip.ps1' \
            --exclude='*.log' \
            ./ /tmp/seo-copilot/
          cd /tmp
          zip -r "seo-copilot-${TAG}.zip" seo-copilot/

      - name: Upload ZIP to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release upload "$TAG" \
            "/tmp/seo-copilot-${TAG}.zip" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
